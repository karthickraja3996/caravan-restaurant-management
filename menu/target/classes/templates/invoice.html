<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Invoice</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
.invoice-box {
    max-width: 600px;
    margin: auto;
    border: 2px solid #000;
    padding: 20px;
}
h2 {
    text-align: center;
    border-bottom: 2px solid #000;
    padding-bottom: 10px;
}
.total {
    font-size: 18px;
}
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        td, th {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .total {
            font-weight: bold;
        }
        @media print {
    button {
        display: none;
    }
}
    </style>
</head>
<body>

<div class="invoice-box">

    <h2>Caravan Restaurant</h2>

    <p><b>Customer:</b> <span th:text="${order.customerName}"></span></p>
    <p><b>Date:</b> <span th:text="${order.orderDate}"></span></p>
    <p><b>Status:</b> <span th:text="${order.status}"></span></p>

    <table>
        <tr>
            <th>Item</th>
            <th>Qty</th>
            <th>Subtotal</th>
            
        </tr>

        <tr th:each="item : ${order.orderItems}">
            <td th:text="${item.menuItem.name}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="${item.subtotal}"></td>
        </tr>

        <tr class="total">
            <td colspan="2">Total</td>
            <td th:text="${order.totalAmount}"></td>
        </tr>
    </table>
<br><br>
<button onclick="printInvoice()">Print Invoice</button>
<script>
    function printInvoice(){
        window.print();
    }
</script>
</div>

</body>
</html>
