<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>add menu item</title>
    <meta charset="UTF-8">
    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 30px;
            background-color: #f5f5f5;

        }
        h1{
            text-align: center;
        }
        form{
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        input,textarea,select{
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
        }
        button{
            width: 100px;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Add Menu Item</h1>
    <nav>
    <a href="/">Home</a> |
    <a href="/menu">Menu</a> |
    <a href="/orders">Orders</a> |
    <a href="/add-menu">Add Menu</a> |
    <a href="/logout">Logout</a>
</nav>
<hr>
    <form th:action="@{/save-menu}" th:object="${menuItem}" method="post">

        <input type="text" th:field="*{name}" placeholder="food name" required>

        <input type="text" th:field="*{category}" placeholder="category" required>

        <input type="number" step="0.01" th:field="*{price}" placeholder="price" required>

        <select th:field="*{availability}">
            <option value="true">Available</option>
            <option value="false">Not-Available</option>
        </select>

        <textarea th:field="*{description}" placeholder="description"></textarea>

        <input type="text" th:field="*{imageUrl}" placeholder="image URL" required>

        <button type="submit">Save Menu Item</button>




    </form>
</body>

</html>
